<section id="hero">

  <!-- Warm orbiting-rings graphic — replaces the surveillance eye -->
  <svg id="heroOrb" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="coreG" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(200,130,10,0.90)"/>
        <stop offset="35%"  stop-color="rgba(190,110,10,0.30)"/>
        <stop offset="70%"  stop-color="rgba(180,90,10,0.08)"/>
        <stop offset="100%" stop-color="rgba(160,70,10,0)"/>
      </radialGradient>
      <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(200,130,10,0.18)"/>
        <stop offset="60%"  stop-color="rgba(200,130,10,0.06)"/>
        <stop offset="100%" stop-color="rgba(200,130,10,0)"/>
      </radialGradient>
    </defs>

    <!-- Outer ambient glow -->
    <circle cx="300" cy="300" r="290" fill="url(#glowG)"/>

    <!-- Concentric rings — visible on light background -->
    <circle cx="300" cy="300" r="255" fill="none" stroke="rgba(184,112,16,0.10)" stroke-width="1"/>
    <circle cx="300" cy="300" r="215" fill="none" stroke="rgba(184,112,16,0.14)" stroke-width="1"/>
    <circle cx="300" cy="300" r="175" fill="none" stroke="rgba(184,112,16,0.18)" stroke-width="1"/>
    <circle cx="300" cy="300" r="135" fill="none" stroke="rgba(184,112,16,0.24)" stroke-width="1.5"/>
    <circle cx="300" cy="300" r="96"  fill="none" stroke="rgba(184,112,16,0.32)" stroke-width="2"/>

    <!-- Warm core -->
    <circle cx="300" cy="300" r="290" fill="url(#coreG)" opacity="0.35"/>
    <circle cx="300" cy="300" r="30"  fill="rgba(200,130,10,0.18)"/>
    <circle cx="300" cy="300" r="18"  fill="rgba(200,130,10,0.38)"/>
    <circle cx="300" cy="300" r="9"   fill="rgba(190,120,10,0.85)"/>

    <!-- Orbiting dots — teal and gold, visible on light background -->
    <circle id="orbDot1" cx="300" cy="85"  r="4"   fill="rgba(26,136,112,0.75)"/>
    <circle id="orbDot2" cx="515" cy="300" r="3"   fill="rgba(184,112,16,0.80)"/>
    <circle id="orbDot3" cx="300" cy="515" r="3.5" fill="rgba(26,136,112,0.60)"/>
    <circle id="orbDot4" cx="85"  cy="300" r="2.5" fill="rgba(184,112,16,0.65)"/>
  </svg>

  <div class="hero-content" id="heroContent">
    <h1 class="hero-title">DIGITAL<br>SOVEREIGNTY<br>LAB</h1>
    <p class="hero-sub">Practical Workshops · Stockholm</p>
    <p class="hero-tools">linux &middot; immich &middot; pi-hole &middot; ollama &middot; meshtastic</p>
  </div>

  <div class="scroll-cue" id="scrollCue">
    <span>SCROLL</span>
    <span class="scroll-line"></span>
  </div>

</section>
