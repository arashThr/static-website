<section id="hero">

  <!-- Warm orbiting-rings graphic — replaces the surveillance eye -->
  <svg id="heroOrb" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="coreG" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(255,195,70,0.95)"/>
        <stop offset="35%"  stop-color="rgba(240,140,30,0.45)"/>
        <stop offset="70%"  stop-color="rgba(220,90,20,0.10)"/>
        <stop offset="100%" stop-color="rgba(200,70,10,0)"/>
      </radialGradient>
      <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="rgba(240,168,32,0.20)"/>
        <stop offset="60%"  stop-color="rgba(240,168,32,0.05)"/>
        <stop offset="100%" stop-color="rgba(240,168,32,0)"/>
      </radialGradient>
    </defs>

    <!-- Outer ambient glow -->
    <circle cx="300" cy="300" r="290" fill="url(#glowG)"/>

    <!-- Concentric rings — subtle, like a sonar or friendly signal -->
    <circle cx="300" cy="300" r="255" fill="none" stroke="rgba(240,168,32,0.05)" stroke-width="1"/>
    <circle cx="300" cy="300" r="215" fill="none" stroke="rgba(240,168,32,0.07)" stroke-width="1"/>
    <circle cx="300" cy="300" r="175" fill="none" stroke="rgba(240,168,32,0.10)" stroke-width="1"/>
    <circle cx="300" cy="300" r="135" fill="none" stroke="rgba(240,168,32,0.14)" stroke-width="1.5"/>
    <circle cx="300" cy="300" r="96"  fill="none" stroke="rgba(240,168,32,0.20)" stroke-width="2"/>

    <!-- Warm core -->
    <circle cx="300" cy="300" r="290" fill="url(#coreG)" opacity="0.25"/>
    <circle cx="300" cy="300" r="30"  fill="rgba(255,200,80,0.14)"/>
    <circle cx="300" cy="300" r="18"  fill="rgba(255,185,55,0.32)"/>
    <circle cx="300" cy="300" r="9"   fill="rgba(255,210,90,0.80)"/>

    <!-- Orbiting dots — teal and gold -->
    <circle id="orbDot1" cx="300" cy="85"  r="4"   fill="rgba(61,184,152,0.80)"/>
    <circle id="orbDot2" cx="515" cy="300" r="3"   fill="rgba(240,168,32,0.70)"/>
    <circle id="orbDot3" cx="300" cy="515" r="3.5" fill="rgba(61,184,152,0.55)"/>
    <circle id="orbDot4" cx="85"  cy="300" r="2.5" fill="rgba(240,140,32,0.60)"/>
  </svg>

  <div class="hero-content" id="heroContent">
    <h1 class="hero-title">DIGITAL<br>SOVEREIGNTY<br>LAB</h1>

    <p class="hero-tools">linux &middot; immich &middot; pi-hole &middot; ollama &middot; meshtastic</p>
  </div>

  <div class="scroll-cue" id="scrollCue">

</section>
