<section id="own-rent">
  <p class="label">What's at stake</p>
  <h2 class="section-heading">Your data.<br>Your call.</h2>

  <div class="data-list" id="dataList">
    {{ range .Site.Data.data_items }}
    <details class="data-item">
      <summary>
        <span class="dot"></span>
        <span class="data-title">{{ .title }}</span>
        <span class="acc-toggle" aria-hidden="true"></span>
      </summary>
      <div class="data-sub">{{ .detail }}</div>
    </details>
    {{ end }}
  </div>
</section>
