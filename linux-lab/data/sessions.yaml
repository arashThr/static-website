- num: "SESSION 01"
  title: "Your Computer, Your Rules"
  brief: "Linux as a foundation for digital freedom."
  covers:
    - "Why Linux matters and which distro is right for you"
    - "Full workflow: browse, code, write, design — no Copilot watching"
    - "No forced updates, no walled garden, no app store permission"
    - "The terminal as a power tool, not a scary thing"
  outcome: "A working Linux install that feels like home."
  tools: "Ubuntu · Fedora · bash · apt/dnf"

- num: "SESSION 02"
  title: "Your Photos, Your Files, Your Server"
  brief: "Self-host your photo library. Own your memories."
  covers:
    - "What platforms do with your photos (AI training, content analysis)"
    - "Account lockouts — no support exists for individuals"
    - "Docker + Immich: your private photo library, live by end of session"
    - "Tailscale: access it from your phone, privately, anywhere"
  outcome: "Immich running and syncing from your phone."
  tools: "Docker · Immich · Jellyfin · Tailscale · Caddy"

- num: "SESSION 03"
  title: "Your Own Little Server"
  brief: "A $50 device that blocks ads and automates your home."
  covers:
    - "Raspberry Pi: first boot and what it can run"
    - "Pi-hole: network-wide ad blocking — covers every device at home"
    - "Home Assistant: offline home automation, no Amazon or Google"
  outcome: "Pi-hole blocking ads on your whole network. Home Assistant controlling one thing."
  tools: "Raspberry Pi · Pi-hole · Home Assistant"

- num: "SESSION 04"
  title: "AI: Use It, Own It"
  brief: "Run AI locally. Your questions stay on your machine."
  covers:
    - "What LLMs actually are — demystified, in plain terms"
    - "Where your queries go when you send them to ChatGPT"
    - "Ollama: one command to run any open model locally"
    - "Chat, document Q&A, coding help — all offline"
  outcome: "Ollama running with Gemma 4. A local AI assistant on your own machine."
  tools: "Ollama · Gemma 4 · LM Studio"

- num: "SESSION 05"
  title: "When the Network Goes Dark"
  brief: "Communication tools that work without internet."
  covers:
    - "BitChat: mesh messaging over Bluetooth/WiFi, no internet needed"
    - "Meshtastic + LoRa: long-range mesh without any infrastructure"
    - "Syncthing: peer-to-peer file sync, no servers"
    - "Lessons from Iran, Ukraine, Sudan — what actually worked offline"
  outcome: "BitChat installed and tested. A personal offline resilience checklist."
  tools: "BitChat · Meshtastic · LoRa · Syncthing"
