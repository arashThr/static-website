- num: "SESSION 01"
  title: "Install Linux on your computer"
  brief: "Ditch Windows or macOS. Your machine runs what you choose, not what Microsoft or Apple decides."
  covers:
    - "Pick a distribution: Ubuntu, Fedora, or something lighter; we compare them"
    - "Boot from USB and try Linux before touching your existing install"
    - "Install it, alongside Windows or replacing it, your call"
    - "Set up your day-to-day: browser, email, code editor, design tools... it's all there"
  outcome: "Linux installed and running on your own machine."
  tools: "Ubuntu · Fedora · bash · apt/dnf"

- num: "SESSION 02"
  title: "Self-host your photos with Immich"
  brief: "Stop uploading to Google Photos. Your pictures stay on your hardware, not Google's, not Apple's."
  covers:
    - "Deploy Immich on your own server. Running and accessible by the end of the session"
    - "Set up automatic sync from your phone over your own network"
    - "Access it remotely via Tailscale. No port forwarding, no public server"
    - "Hardware options: old laptop, Raspberry Pi, or a cheap VPS"
  outcome: "Immich running. Photos syncing from your phone. No third party involved."
  tools: "Docker · Immich · Tailscale · Caddy"

- num: "SESSION 03"
  title: "Run Pi-hole and Home Assistant at home"
  brief: "Block every ad on your network. Automate your home without an Amazon or Google account."
  covers:
    - "Raspberry Pi: first boot, connect over SSH, install what you need"
    - "Pi-hole: blocks ads and trackers for every device connected to your WiFi"
    - "Home Assistant: lights, sensors, climate; controlled locally, no cloud login"
    - "Once you can run a Pi, you can run anything on it"
  outcome: "Pi-hole blocking ads across your whole network. Home Assistant controlling at least one device."
  tools: "Raspberry Pi · Pi-hole · Home Assistant"

- num: "SESSION 04"
  title: "Run AI models on your own laptop"
  brief: "ChatGPT logs everything you type. Ollama runs on your machine and sends nothing anywhere."
  covers:
    - "How LLMs work. One plain explanation, no jargon"
    - "Ollama: install and run Gemma 4 with a single command"
    - "LM Studio: a point-and-click interface if you prefer not to use the terminal"
    - "Practical uses: writing help, document Q&A, coding, summarising. All offline"
  outcome: "Ollama running with Gemma 4. A working local AI, no internet required."
  tools: "Ollama · Gemma 4 · LM Studio"

- num: "SESSION 05"
  title: "Communicate when the internet goes down"
  brief: "Bluetooth mesh, LoRa radio, and peer-to-peer sync. Tools that work with no infrastructure at all."
  covers:
    - "BitChat: send messages over a Bluetooth mesh. no SIM, no WiFi, no server"
    - "Meshtastic + LoRa radio: kilometre-range communication with no cell signal"
    - "Syncthing: sync files between your own devices, no server in the middle"
    - "Build your offline kit: What to prepare before you actually need it"
  outcome: "BitChat installed and tested between devices. Your personal offline checklist done."
  tools: "BitChat · Meshtastic · LoRa · Syncthing"
