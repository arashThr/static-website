- title: "Your photos — Google Photos, iCloud, Meta"
  detail: "Every upload is scanned. Used for AI training, content matching, and ad targeting. Accounts get suspended by automated systems with no human review and no appeal."

- title: "Your email and messages — Gmail, WhatsApp, iMessage"
  detail: "Gmail scans your email to build an ad profile. WhatsApp hands metadata to Meta. Signal is the exception. Most messaging is not private by default."

- title: "Your browsing — Chrome, Edge, most apps"
  detail: "Your browser and apps log what you read, search, and buy. That data is sold to data brokers and kept indefinitely. Switching to Firefox + uBlock Origin takes ten minutes."

- title: "Your software — Adobe, Microsoft 365, Spotify"
  detail: "Stop paying and you lose access — including to files you created. Open source alternatives exist for almost all of them and don't require a subscription."

- title: "Your internet connection"
  detail: "Your ISP can throttle specific services, log your traffic, and hand it over on request. Governments can order a full shutdown. Iran has been offline for 40+ days. It can happen anywhere."
