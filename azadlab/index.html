<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azad Lab — Digital Sovereignty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/winbox/dist/css/winbox.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Eye canvas background -->
  <canvas id="eyeCanvas"></canvas>

  <!-- Surveillance notification (shown on load) -->
  <div id="notifOverlay" class="notif-overlay">
    <div class="notif-box">
      <div class="notif-eye">👁</div>
      <div class="notif-alert">SURVEILLANCE ALERT</div>
      <div class="notif-headline">YOU ARE BEING WATCHED</div>
      <p class="notif-body">
        Your IP address, location, device fingerprint,<br>
        browsing history, and communications<br>
        are being collected and stored.<br><br>
        <em>This is not hypothetical.</em>
      </p>
      <button class="notif-btn" id="notifClose">I understand — show me how to fight back</button>
    </div>
  </div>

  <!-- Desktop -->
  <div id="desktop">
    <div class="status-bar">
      <span class="status-host">azadlab@free:~</span>
      <span class="status-sep">·</span>
      <span id="clock">--:--</span>
      <span class="status-sep">·</span>
      <span class="status-msg">still online</span>
    </div>

    <!-- Desktop icons -->
    <div class="icon-grid" id="iconGrid">

      <button class="icon" data-win="readme">
        <svg class="icon-svg" viewBox="0 0 32 38"><path d="M3 2h18l9 9v25H3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M21 2v9h9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="8" y1="17" x2="24" y2="17" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="22" x2="24" y2="22" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="27" x2="18" y2="27" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
        <span>README.txt</span>
      </button>

      <button class="icon" data-win="about">
        <svg class="icon-svg" viewBox="0 0 32 38"><path d="M3 2h18l9 9v25H3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M21 2v9h9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="8" y1="17" x2="24" y2="17" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="22" x2="24" y2="22" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="27" x2="18" y2="27" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
        <span>ABOUT.txt</span>
      </button>

      <button class="icon" data-win="sessions">
        <svg class="icon-svg" viewBox="0 0 40 32"><path d="M2 10h36v20H2z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M2 10h12l4-5h8v5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
        <span>SESSIONS/</span>
      </button>

      <button class="icon" data-win="manifesto">
        <svg class="icon-svg" viewBox="0 0 32 38"><path d="M3 2h18l9 9v25H3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M21 2v9h9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="8" y1="17" x2="24" y2="17" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="22" x2="24" y2="22" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="27" x2="18" y2="27" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
        <span>MANIFESTO.txt</span>
      </button>

      <button class="icon" data-win="join">
        <svg class="icon-svg" viewBox="0 0 32 38"><path d="M3 2h18l9 9v25H3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M21 2v9h9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><line x1="8" y1="17" x2="24" y2="17" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="22" x2="24" y2="22" stroke="currentColor" stroke-width="1" opacity=".5"/><line x1="8" y1="27" x2="18" y2="27" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
        <span>JOIN.txt</span>
      </button>

    </div>

    <!-- Terminal widget -->
    <div class="terminal">
      <div class="term-bar">
        <span class="tdot r"></span><span class="tdot y"></span><span class="tdot g"></span>
        <span class="term-title">terminal</span>
      </div>
      <div class="term-body">
        <span class="term-prompt">$ </span><span id="termMsg"></span><span class="term-cur">▋</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/winbox/dist/js/winbox.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
